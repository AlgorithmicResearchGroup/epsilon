name: Publish Docker Image to GHCR

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Optional image name override (e.g. ghcr.io/org/repo)"
        required: false
        type: string
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.image || '' }}" ]]; then
            image="${{ github.event.inputs.image }}"
          else
            owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            repo="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
            image="ghcr.io/${owner}/${repo}"
          fi
          echo "value=${image}" >> "$GITHUB_OUTPUT"
          echo "Publishing image: ${image}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Prefer explicit PAT-based auth for org/private package setups.
          # Fallback to the workflow GITHUB_TOKEN when GHCR_TOKEN is not configured.
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.value }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
